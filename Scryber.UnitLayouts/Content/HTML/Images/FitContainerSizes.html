<html xmlns="http://www.w3.org/1999/xhtml" >
    <head>
        <title>Image Fit Container Sizes</title>
        <style>
            @page{
                size: A5;
                margin : 0;
            }
        </style>
    </head>
    <body style="margin: 10pt;">
    <div>
        <img src="../../Images/Toroid32.png" />
        1. No Explicit sizes
    </div>
    <div style="page-break-before: always;">
        <img style="width: 100%" src="../../Images/Toroid32.png" />
        2. Full width in page
    </div>
    <div style="page-break-before: always;">
        <img style="width: 100%; max-height: 200pt;" src="../../Images/Toroid32.png" />
        3. Full width in page with 200 max height
    </div>
    </body>

</html>
