<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>SVG images with both img width and height overridden</title>
        <style>
            body { padding: 5pt; }
            img { border: 1px solid black; background-color: lightsalmon; }
            p { margin: 0; margin-bottom: 5pt; }
        </style>
    </head>
    <body>
        <!-- SVG intrinsic 200x150, img 400x300 — canvas stays 200x150, run is 400x300 -->
        <img id="svg_override_400x300" src="Sample_HasViewbox_HasWidth_HasHeight.svg" style="width:400pt;height:300pt" />
        <p>SVG 200x150 (viewBox), img 400x300 — canvas 200x150, run 400x300</p>

        <!-- SVG intrinsic 300x150 (default), img 100x100 — canvas stays 300x150, run is 100x100 -->
        <img id="svg_override_100x100" src="Sample_NoViewbox_NoWidth_NoHeight.svg" style="width:100pt;height:100pt" />
        <p>SVG 300x150 (default), img 100x100 — canvas 300x150, run 100x100</p>
    </body>
</html>
