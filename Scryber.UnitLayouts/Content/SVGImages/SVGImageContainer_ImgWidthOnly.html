<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>SVG images with img width override only — height should scale proportionally</title>
        <style>
            body { padding: 5pt; }
            img { border: 1px solid black; background-color: lightyellow; }
            p { margin: 0; margin-bottom: 5pt; }
        </style>
    </head>
    <body>
        <!-- SVG intrinsic 150x100 (no viewBox), img width=300 → rendered 300x200 -->
        <img id="svg_w300" src="Sample_NoViewbox_HasWidth_HasHeight.svg" style="width:300pt" />
        <p>SVG 150x100, img width=300pt - expects run 300x200</p>

        <!-- SVG intrinsic 200x150 (via viewBox), img width=400 → rendered 400x300 -->
        <img id="svg_vb_w400" src="Sample_HasViewbox_HasWidth_HasHeight.svg" style="width:400pt" />
        <p>SVG 200x150 (viewBox), img width=400pt - expects run 400x300</p>

        <!-- SVG intrinsic 300x150 (defaults, no dims), img width=150 → rendered 150x75 -->
        <img id="svg_def_w150" src="Sample_Test.svg"  />
        <p>SVG 300x150 (default), img width=150pt - expects run 150x75</p>
    
    </body>
</html>
