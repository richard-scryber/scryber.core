<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>SVG images with viewBox only (no explicit SVG width/height, no img size)</title>
        <style>
            body { padding: 5pt; }
            img { border: 1px solid black; background-color: lightblue; }
            p { margin: 0; margin-bottom: 5pt; }
        </style>
    </head>
    <body>
        <img id="svg_vb_200x150" src="Sample_ViewboxOnly_200x150.svg" />
        <p>viewBox 200x150, no explicit dims — expects canvas 200x150</p>

        <img id="svg_vb_400x150" src="Sample_ViewboxOnly_400x150.svg" />
        <p>viewBox 400x150, no explicit dims — expects canvas 400x150</p>

        <img id="svg_vb_150x400" src="Sample_ViewboxOnly_150x400.svg" />
        <p>viewBox 150x400, no explicit dims — expects canvas 150x400</p>
    </body>
</html>
