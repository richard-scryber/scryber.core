
<html xmlns="http://www.w3.org/1999/xhtml" >
    <head>
        <title>Image Wrapper for svg images with no img dimensions</title>
        <style>
            body { padding: 5pt;}
            
            img {
                border: 1px solid black;
                background-color: red;
            }
            p { margin: 0;
                margin-bottom: 5pt;
            }
        </style>
    </head>
    <body>
        <img id="dynamicSVG_VBWidthHeight" src="Sample_HasViewbox_HasWidth_HasHeight.svg" />
        <p >Baseline Image</p>
        
        <img id="dynamicSVG_Width" src="Sample_NoViewbox_HasWidth_NoHeight.svg"/>
        <p>Inner width</p>
        
        <img id="dynamicSVG_Height" src="Sample_NoViewbox_NoWidth_HasHeight.svg" />
        <p >Inner height</p>
        
        <img id="dynamicSVG_WidthHeight" src="Sample_NoViewbox_HasWidth_HasHeight.svg" />
        <p >Inner width and height</p>
        

        <img id="dynamicSVG_None" src="Sample_NoViewbox_NoWidth_NoHeight.svg"/>
        <p>No dimensions</p>
    </body>
</html>
