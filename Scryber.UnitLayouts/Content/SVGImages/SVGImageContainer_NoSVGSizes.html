<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>SVG No Inner Sizes</title>
        <style>
            body { padding: 5pt; }
            img { border: 1px solid black; background-color: lightyellow; }
            p { margin: 0; margin-bottom: 5pt; }
        </style>
    </head>
    <body>
        <!-- SVG intrinsic 150x100 (no viewBox), img width=300 → rendered 300x200 -->
        <img id="svg_nothing" src="Sample_NoViewbox_NoWidth_NoHeight.svg" />
        <p>SVG Default 300x150 expects run 300x150</p>

        <img id="svg_onlyWidth" src="Sample_NoViewbox_NoWidth_NoHeight.svg" style="width:100pt;" />
        <p>SVG Default 300x150 expects run 300x150</p>

        <img id="svg_onlyHeight" src="Sample_NoViewbox_NoWidth_NoHeight.svg" style="height:100pt;" />
        <p>SVG Default 300x150 expects run 300x150</p>

        <img id="svg_WidthAndHeight" src="Sample_NoViewbox_NoWidth_NoHeight.svg" style="width: 100pt; height:100pt;" />
        <p>SVG Default 300x150 expects run 300x150</p>

        <img id="svg_WidthAndHeightBig" src="Sample_NoViewbox_NoWidth_NoHeight.svg" style="width: 100pt; height:300pt;" />
        <p>SVG Default 300x150 expects run 300x150</p>
    
    </body>
</html>
