<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
        "http://www.w3.org/TR/html4/strict.dtd">

<html lang='en' xmlns='http://www.w3.org/1999/xhtml'
      title="Root">
<head>
    <meta charset='utf-8' name='author' content='Richard Hewitson' />

    <title>This is a body with headers and footers</title>
    <style type="text/css" >
        header, footer{
            background-color: #333;
            color: #EEE;
            font-size:12pt;
        }

        p{
            margin-top:0px;
        }
        html {
            margin:15pt;
            background-color: aquamarine;
            font-family: serif;
        }
        body{
            border: solid 1pt #EEE;
        }

        @page {
            size:A4;
            margin-top: 10pt;
        }
        
        @page :left{
            margin-right:20pt;
        }

        @page:right{
            margin-left:20pt;
        }
        
        p span::before{
            content: '*';
        }

    </style>
</head>

<body>

<header>
    <p>In the header</p>
</header>
<footer>
    <p>In the footer</p>
</footer>
<p>
    <span>Page has outer margins</span>
</p>
<p style="break-before: page;">
    On the second continuation page
</p>
</body>
</html>
